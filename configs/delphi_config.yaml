# DELPHI Configuration File
# Dynamic Ensemble Leveraging Probabilistic Hybrid Inference

# Data Configuration
data:
  data_dir: "data"  # Changed to support multiple data formats
  train_end_week: 209  # End of 2018 (Weeks 1-209)
  val_end_week: 261     # End of 2019 (Weeks 210-261)
  forecast_horizon: 26  # 26 weeks ahead
  seasonal_period: 52  # Weekly data, annual seasonality
  use_synthetic_data: false  # Use synthetic data if HERMES not available
  synthetic_n_series: 100
  synthetic_length: 260

# Preprocessing
preprocessing:
  deseasonalize: true
  compute_weak_ratio: true
  loess_frac: 0.3
  min_total: 1e-6
  normalize_residuals: true
  residual_window_size: 52

# Parametric Baseline (TBATS)
parametric:
  model_type: "tbats"
  use_box_cox: true
  use_trend: true
  use_arma_errors: true
  seasonal_periods: [52]  # Annual seasonality
  n_jobs: 4

# Variational HMM Gating
hmm:
  n_states: 4  # Number of latent states
  input_dim: 3  # [z_t, w_t, ŷ_pred_t]
  hidden_size: 64
  num_layers: 2
  dropout: 0.2
  use_posterior: true

# Deep Ensemble Correctors
ensemble:
  n_members: 5  # M=5 ensemble members
  hidden_size: 64
  num_layers: 2
  dropout: 0.2
  corrector_types:
    - "trend"  # Trend-Corrector RNN
    - "seasonality"  # Seasonality-Corrector RNN
    - "volatility"  # Volatility/Shift-Corrector RNN
    - "external_signal"  # External Signal Specialist
    - "general"  # General corrector (5th member)
  use_xlstm_for_trend: false  # Use xLSTMTime for trend corrector

# Training Configuration
training:
  batch_size: 32
  learning_rate: 1e-3
  weight_decay: 1e-5
  num_epochs: 100
  early_stopping_patience: 10
  early_stopping_min_delta: 1e-4
  
  # Two-stage ELBO training
  stage1_epochs: 15  # Emissions/posterior training (loss typically stabilizes by epoch 10-15)
  stage2_epochs: 10   # Prior training (shorter since it only trains the HMM prior)
  kl_weight: 0.1     # KL divergence weight in ELBO
  entropy_weight: 0.01  # Entropy regularization weight
  
  # Optimizer
  optimizer: "adam"
  scheduler: "cosine"
  warmup_epochs: 5
  
  # Checkpointing
  save_dir: "checkpoints"
  save_every: 10
  log_dir: "logs"
  use_tensorboard: true

# Meta-Ensemble Configuration
meta_ensemble:
  models:
    - "delphi_core"  # Custom Hybrid (HMM-RNN)
    - "patchtst"
    - "nbeats"
    - "nhits"
    - "chronos2"
    - "xlstmtime"
    - "ets"
    - "snaive"
  
  # XGBoost meta-learner
  meta_learner:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8

# Model-specific configurations
models:
  patchtst:
    context_length: 52
    prediction_length: 26
    patch_len: 16
    stride: 8
    d_model: 128
    n_heads: 8
    n_layers: 3
  
  nbeats:
    context_length: 52
    prediction_length: 26
    n_blocks: 3
    n_layers: 4
    hidden_size: 256
  
  nhits:
    context_length: 52
    prediction_length: 26
    n_blocks: 3
    n_layers: 4
    hidden_size: 256
  
  chronos2:
    model_size: "small"  # small, base, large
    context_length: 52
    prediction_length: 26
  
  xlstmtime:
    hidden_size: 128
    num_layers: 2
    context_length: 52
    prediction_length: 26
  
  ets:
    seasonal: "add"
    seasonal_periods: 52
  
  snaive:
    seasonal_period: 52

# MinT Reconciliation
reconciliation:
  enabled: true
  method: "mint"  # Minimum Trace
  hierarchy_levels: []  # Define hierarchy if applicable

# Inference Configuration
inference:
  num_samples: 100  # Number of HMM trajectory samples for uncertainty
  confidence_level: 0.95  # 95% confidence intervals
  batch_size: 64
  use_gpu: true

# Evaluation Metrics
evaluation:
  metrics:
    - "mase"
    - "owa"
    - "mae"
    - "rmse"
    - "pda"  # Prediction Direction Accuracy
  calibration_metrics: true
  regime_accuracy: true  # If ground truth regimes available

# Hardware
device: "cuda"  # cuda or cpu
num_workers: 4
pin_memory: true

# Random seed
seed: 42

