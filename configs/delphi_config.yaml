# DELPHI Configuration File
# Dynamic Ensemble Leveraging Probabilistic Hybrid Inference

# Data Configuration
data:
  data_dir: "data"
  train_end_week: 209  # End of 2018 (Weeks 1-209)
  val_end_week: 261     # End of 2019 (Weeks 210-261)
  forecast_horizon: 26  # 26 weeks ahead
  seasonal_period: 52  # Weekly data, annual seasonality

# Preprocessing
preprocessing:
  deseasonalize: true
  compute_weak_ratio: true
  loess_frac: 0.3
  min_total: 1e-6
  normalize_residuals: true
  residual_window_size: 52

# Parametric Baseline (TBATS)
parametric:
  model_type: "tbats"
  use_box_cox: true
  use_trend: true
  use_arma_errors: true
  seasonal_periods: [52]

# Variational HMM Gating
hmm:
  n_states: 4  # Number of latent states (matches 4 correctors)
  hidden_size: 64
  num_layers: 2
  dropout: 0.2

# Deep Ensemble Correctors
ensemble:
  n_members: 4  # 4 specialized correctors (1:1 with HMM states)
  hidden_size: 64
  num_layers: 2
  dropout: 0.2

# Training Configuration
training:
  batch_size: 32
  learning_rate: 1e-3
  weight_decay: 1e-5
  early_stopping_patience: 10
  early_stopping_min_delta: 1e-4
  
  # Two-stage ELBO training
  stage1_epochs: 15  # Emissions/posterior training
  stage2_epochs: 10  # Prior training
  kl_weight: 0.1     # KL divergence weight in ELBO
  entropy_weight: 0.01  # Entropy regularization weight
  
  # Checkpointing
  save_dir: "checkpoints"
  log_dir: "logs"

# Inference Configuration
inference:
  num_samples: 100  # HMM trajectory samples for uncertainty quantification

# Hardware
device: "cuda"
num_workers: 4
pin_memory: true

# Random seed
seed: 42
